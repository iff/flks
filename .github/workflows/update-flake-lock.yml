name: update-flake-lock

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * 4"

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: install nix
        uses: cachix/install-nix-action@6004951b182f8860210c8d6f0d808ec5b1a33d28 # v25
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          nix_path: nixpkgs=channel:nixos-unstable

      - name: flup
        run: |
          git config user.name github-actions[bot]
          # https://api.github.com/users/github-actions[bot] seems to be the API entry for the 
          # github-actions bot, which also contains the ID 41898282.
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          nix --accept-flake-config flake update --commit-lock-file

      - name: flakers
        id: commit
        run: |
          delimiter="$(openssl rand -hex 16)"
          echo "message<<${delimiter}" >> "${GITHUB_OUTPUT}"
          git log -1 --pretty=%B | tail +3 | nix run github:iff/flakers >> "${GITHUB_OUTPUT}"
          echo "${delimiter}" >> "${GITHUB_OUTPUT}"

      - name: open pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          title: "flup: update flks"
          body: "${{ steps.commit.outputs.message }}"
          branch: automated/flake-updates
          delete-branch: true
          assignees: iff
